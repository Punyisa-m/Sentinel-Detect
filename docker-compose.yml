services:

  api:
    build:
      context: .
      target: runtime
    image: sentinel-detect:latest
    container_name: sentinel-api
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --workers 1
    ports:
      - "8100:8000"
    volumes:
      - sentinel-data:/app
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 600M
          cpus: "1.0"
        reservations:
          memory: 200M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  ui:
    image: sentinel-detect:latest
    container_name: sentinel-ui
    entrypoint: ["/entrypoint.sh"]
    command: >
      streamlit run dashboard.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
      --server.fileWatcherType none
    ports:
      - "8502:8501"
    volumes:
      - sentinel-data:/app
    environment:
      - API_BASE=http://api:8000
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 400M
          cpus: "0.75"
        reservations:
          memory: 150M

volumes:
  sentinel-data:
    driver: local